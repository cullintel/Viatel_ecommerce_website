<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Viatel Solutions</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <section id="header">
        <a href="Index.html"><img src="Viatel web assets/Logo/Viatel solutions.png" class="logo" alt="Viatel Solutions Logo"></a>
        <div>
            <ul id="navbar">
                <li><a href="Index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a class="active" href="product.html">Products</a></li>
                <li><a href="contacts.html">Contacts</a></li>
            </ul>
        </div>
    </section>

    <div class="checkout-container">
        <div class="checkout-header">
            <h1>Checkout</h1>
            <p>Complete your order below.</p>
        </div>

        <form id="checkout-form">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label for="payment">Payment Method</label>
                <select id="payment" name="payment" required onchange="showPaymentDetails()">
                    <option value="credit-card">Credit Card</option>
                    <option value="mpesa">M-Pesa</option>
                </select>
            </div>

            <div id="mpesa-details" style="display: none;">
                <div class="form-group">
                    <label for="mpesaNumber">M-Pesa Number</label>
                    <input type="text" id="mpesaNumber" name="mpesaNumber" placeholder="Enter your M-Pesa number">
                </div>
                <p id="mpesa-warning" style="color: red; display: none;">M-Pesa payments above Ksh 400,000 are not allowed.</p>
            </div>

            <div class="checkout-summary">
                <h2>Order Summary</h2>
                <div class="summary-item">
                    <span>Total</span>
                    <strong class="summary-total">Ksh 0</strong>
                </div>
            </div>
            
            <button type="button" class="checkout-btn" onclick="processPayment()">Place Order</button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const totalDisplay = document.querySelector(".summary-total");
            const total = localStorage.getItem("cartTotal") || "0";
            totalDisplay.textContent = `Ksh ${parseInt(total).toLocaleString()}`;
        });

        function showPaymentDetails() {
            const paymentMethod = document.getElementById('payment').value;
            document.getElementById('mpesa-details').style.display = paymentMethod === 'mpesa' ? 'block' : 'none';
        }

        function processPayment() {
            const paymentMethod = document.getElementById('payment').value;
            const totalAmount = parseInt(localStorage.getItem("cartTotal")) || 0;

            if (paymentMethod === 'mpesa') {
                const mpesaNumber = document.getElementById('mpesaNumber').value;
                
                if (totalAmount > 400000) {
                    document.getElementById('mpesa-warning').style.display = 'block';
                    return;
                }

                fetch('https://2318-197-237-225-28.ngrok-free.app', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: mpesaNumber,  
                        amount: totalAmount  
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('Payment request sent. Please check your phone to complete the payment.');
                    } else {
                        alert('Payment failed: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('There was an error processing the payment.');
                });

            } else {
                alert('Processing Credit Card Payment...');
            }
        }
    </script>
</body>
</html>
